services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./infra/rabbitmq/advanced.config:/etc/rabbitmq/advanced.config
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 120s
    restart: unless-stopped

  postgres-backend:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: architect
      POSTGRES_PASSWORD: architect
      POSTGRES_DB: architect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architect -d architect"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  postgres-tickets:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets
      POSTGRES_DB: tickets
    volumes:
      - postgres_tickets_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  ticket-service:
    build:
      context: ./ticket-service
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8003:8000"
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "ticket-service"
      DATABASE_URL: "postgresql://tickets:tickets@postgres-tickets:5432/tickets"
      SERVICE_HOST: "http://ticket-service:8000"
      WHITELISTED_HOSTS: "http://mcp-server:8000,http://backend:8000"
    volumes:
      - ./ticket-service:/app
      - ticket_service_node_modules:/app/node_modules
      - ticket_service_dist:/app/dist
    depends_on:
      postgres-tickets:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8002:8000"
    env_file:
      - ./mcp-server/.env
    environment:
      APP_ENV: "DEV"
      SERVICE_NAME: "mcp-server"
      CORS_ORIGINS: "http://localhost:3000,http://architect-agent:8000"
      TICKET_SERVICE_URL: "http://ticket-service:8000"
      REDIS_URL: "redis://redis:6379"
      PROVIDER_NAME: "Ticket MCP Server"
      PROVIDER_HOST: "http://mcp-server:8000"
      SERVICE_HOST: "http://mcp-server:8000"
      WHITELISTED_HOSTS: "http://ticket-agent:8000"
    volumes:
      - ./mcp-server:/app
    depends_on:
      ticket-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  architect-agent:
    build:
      context: ./architect-agent
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - ./architect-agent/.env
    environment:
      APP_ENV: "DEV"
      SERVICE_NAME: "architect-agent"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      CORS_ORIGINS: "http://localhost:3000,http://backend:8000"
    volumes:
      - ./architect-agent:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ticket-agent:
    build:
      context: ./ticket-agent
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8004:8000"
    env_file:
      - ./architect-agent/.env
      - ./ticket-agent/.env
    environment:
      APP_ENV: "DEV"
      SERVICE_NAME: "ticket-agent"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      MCP_SERVER_URL: "http://mcp-server:8000"
      CORS_ORIGINS: "http://localhost:3000"
      SERVICE_HOST: "http://ticket-agent:8000"
    volumes:
      - ./ticket-agent:/app
    depends_on:
      mcp-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      APP_ENV: "DEV"
      SERVICE_NAME: "backend"
      SERVICE_HOST: "http://backend:8000"
      CORS_ORIGINS: "http://localhost:3000"
      DATABASE_URL: "postgresql://architect:architect@postgres-backend:5432/architect"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      TICKET_SERVICE_URL: "http://ticket-service:8000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    depends_on:
      postgres-backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: infra/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_TARGET: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_tickets_data:
  redis_data:
  backend_node_modules:
  backend_dist:
  ticket_service_node_modules:
  ticket_service_dist:
