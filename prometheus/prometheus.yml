global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ['backend:8000']

  - job_name: architect-agent
    static_configs:
      - targets: ['architect-agent:8000']

  - job_name: ticket-agent
    static_configs:
      - targets: ['ticket-agent:8000']

  - job_name: mcp-server
    static_configs:
      - targets: ['mcp-server:8000']

  - job_name: ticket-service
    static_configs:
      - targets: ['ticket-service:8000']
